name: Daily Newsletter

on:
  schedule:
    # 6:00 AM Central Time on weekdays.
    # CT is UTC-5 (CDT) in summer and UTC-6 (CST) in winter.
    # 11:00 UTC = 6:00 AM CDT / 5:00 AM CST. GitHub cron does not support DST.
    - cron: '0 11 * * 1-5'
  workflow_dispatch: {}

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}       # optional, defaults to smtp.gmail.com
          SMTP_PORT: ${{ secrets.SMTP_PORT }}       # optional, defaults to 587
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python -m src.main
